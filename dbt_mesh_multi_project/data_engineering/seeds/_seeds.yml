version: 2

seeds:
  - name: raw_customers
    description: "Raw customer data from the ecommerce platform."
    config:
      column_types:
        id: string
        name: string

  - name: raw_orders
    description: "Raw orders placed by customers across all store locations."
    config:
      column_types:
        id: string
        customer: string
        ordered_at: string
        store_id: string
        subtotal: int64
        tax_paid: int64
        order_total: int64

  - name: raw_items
    description: "Raw line items linking orders to product SKUs."
    config:
      column_types:
        id: string
        order_id: string
        sku: string

  - name: raw_products
    description: "Raw product catalog with SKUs, names, types, and prices."
    config:
      column_types:
        sku: string
        name: string
        type: string
        price: int64
        description: string

  - name: raw_stores
    description: "Raw store locations with opening dates and tax rates."
    config:
      column_types:
        id: string
        name: string
        opened_at: string
        tax_rate: float64

  - name: raw_supplies
    description: "Raw supply chain data linking ingredients and materials to product SKUs."
    config:
      column_types:
        id: string
        name: string
        cost: int64
        perishable: string
        sku: string
