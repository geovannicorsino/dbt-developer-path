version: 2

models:
  - name: fct_orders
    description: "Fact table for orders. Joins orders with customer and store information."
    config:
      group: ecommerce
      contract:
        enforced: true
      access: public
    columns:
      - name: order_id
        description: "Unique identifier for each order."
        data_type: string
        constraints:
          - type: not_null
      - name: customer_id
        description: "Foreign key to the customer."
        data_type: string
      - name: store_id
        description: "Foreign key to the store."
        data_type: string
      - name: customer_name
        description: "Full name of the customer."
        data_type: string
      - name: store_name
        description: "Name of the store location."
        data_type: string
      - name: subtotal
        description: "Order subtotal before tax, in cents."
        data_type: int64
      - name: tax_paid
        description: "Tax amount paid, in cents."
        data_type: int64
      - name: order_total
        description: "Total order amount including tax, in cents."
        data_type: int64
      - name: tax_rate
        description: "Tax rate applied at the store."
        data_type: float64
      - name: ordered_at
        description: "Timestamp when the order was placed."
        data_type: timestamp

  - name: fct_order_items
    description: "Fact table for order line items. Joins items with order, customer, and store details."
    config:
      group: ecommerce
      contract:
        enforced: true
      access: public
    columns:
      - name: order_item_id
        description: "Unique identifier for the order line item."
        data_type: string
        constraints:
          - type: not_null
      - name: order_id
        description: "Foreign key to the parent order."
        data_type: string
      - name: sku
        description: "Product SKU purchased in this line item."
        data_type: string
      - name: customer_id
        description: "Foreign key to the customer."
        data_type: string
      - name: store_id
        description: "Foreign key to the store."
        data_type: string
      - name: order_total
        description: "Total order amount including tax, in cents."
        data_type: int64
      - name: ordered_at
        description: "Timestamp when the order was placed."
        data_type: timestamp

  - name: dim_customers
    description: "Customer dimension with lifetime order metrics."
    config:
      group: ecommerce
      contract:
        enforced: true
      access: public
    columns:
      - name: customer_id
        description: "Unique identifier for the customer."
        data_type: string
        constraints:
          - type: not_null
      - name: customer_name
        description: "Full name of the customer."
        data_type: string
      - name: total_orders
        description: "Total number of orders placed by the customer."
        data_type: int64
      - name: lifetime_value
        description: "Total revenue generated by the customer, in cents."
        data_type: int64
      - name: first_order_at
        description: "Timestamp of the customer's first order."
        data_type: timestamp
      - name: most_recent_order_at
        description: "Timestamp of the customer's most recent order."
        data_type: timestamp

  - name: dim_stores
    description: "Store dimension with location performance metrics."
    config:
      group: ecommerce
      contract:
        enforced: true
      access: public
    columns:
      - name: store_id
        description: "Unique identifier for the store."
        data_type: string
        constraints:
          - type: not_null
      - name: store_name
        description: "Name of the store location."
        data_type: string
      - name: opened_at
        description: "Timestamp when the store opened."
        data_type: timestamp
      - name: tax_rate
        description: "Sales tax rate at this location."
        data_type: float64
      - name: total_orders
        description: "Total number of orders processed at this store."
        data_type: int64
      - name: total_revenue
        description: "Total revenue generated at this store, in cents."
        data_type: int64
