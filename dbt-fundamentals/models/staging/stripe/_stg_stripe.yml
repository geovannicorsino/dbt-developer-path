models:
  - name: stg_stripe__payment
    description: one unique payment per row with cleaned and transformed data
    columns:
      - name: payment_id
        description: the primary key
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: foreign key to orders
      - name: payment_method
        description: method used for payment (e.g., credit_card, bank_transfer)
      - name: status
        description: payment status (e.g., success, failed, pending)
      - name: amount
        description: payment amount in dollars (converted from cents)
      - name: created_at
        description: timestamp when the payment was created
