models:
  - name: fct_orders
    description: fact table containing order data with customer and payment information
    columns:
      - name: order_id
        description: the primary key
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: foreign key to customers
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: order_date
        description: date when the order was placed
      - name: amount
        description: total payment amount in dollars for the order
