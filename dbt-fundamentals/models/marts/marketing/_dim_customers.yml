models:
  - name: dim_customers
    description: dimensional table containing customer data with order metrics and lifetime value
    columns:
      - name: customer_id
        description: the primary key
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: customer's first name
      - name: last_name
        description: customer's last name
      - name: first_order_date
        description: date of the customer's first order
      - name: most_recent_order_date
        description: date of the customer's most recent order
      - name: number_of_orders
        description: total count of orders placed by the customer
      - name: lifetime_value
        description: total amount spent by the customer across all orders in dollars
